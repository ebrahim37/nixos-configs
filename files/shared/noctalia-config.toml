[audio]
enable_sounds = true

[bar.default]
center = []
end = [
    "media",
    "tray",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "notifications",
    "control-center",
    "weather",
    "date",
    "clock",
    "session"
]
scale = 1.1000000089406967
start = [ "launcher", "wallpaper", "workspaces", "active_window" ]
widget_spacing = 12

[control_center]
hidden_tabs = [ "monitor", "power", "bluetooth" ]

    [[control_center.shortcuts]]
    type = "dark_mode"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "mic_mute"

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[location]
address = "North York, ON, Canada"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@Virtual-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1720.0
    cy = 1250.0
    output = "Virtual-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true

[shell]
external_ip_enabled = true
font_family = "Noto Sans"
launch_apps_as_systemd_services = true
polkit_agent = true
screen_time_enabled = true

    [shell.launcher]
    app_grid = true

        [shell.launcher.providers.emoji]
        prefix = "e"

        [shell.launcher.providers.session]
        global = true

    [shell.panel]
    open_near_click_control_center = true
    open_near_click_session = true
    transparency_mode = "glass"

    [shell.screenshot]
    directory = "/home/ebrahim/Downloads"

    [shell.session]
    grid = true
    grid_columns = 2

        [[shell.session.actions]]
        action = "lock"
        countdown_seconds = 0.0
        enabled = true
        shortcut = "1"
        variant = "default"

        [[shell.session.actions]]
        action = "logout"
        countdown_seconds = 0.0
        enabled = false
        shortcut = "2"
        variant = "default"

        [[shell.session.actions]]
        action = "lock_and_suspend"
        countdown_seconds = 0.0
        enabled = true
        shortcut = "3"
        variant = "default"

        [[shell.session.actions]]
        action = "reboot"
        countdown_seconds = 0.0
        enabled = true
        shortcut = "4"
        variant = "default"

        [[shell.session.actions]]
        action = "shutdown"
        countdown_seconds = 0.0
        enabled = true
        shortcut = "5"
        variant = "destructive"

[theme]
builtin = "Ayu"

[widget.clipboard]
enabled = false

[widget.clock]
format = "{:%l:%M %p}"

[widget.date]
format = "{:%A %B %d}"

[widget.launcher]
enabled = false

[widget.network]
enabled = false

[widget.session]
enabled = false

[widget.volume]
enabled = false

[widget.wallpaper]
enabled = false
